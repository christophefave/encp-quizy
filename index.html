<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configuration Tailwind pour les couleurs de l'ENCP -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        encp: {
                            blue: '#1e3a8a',   // Bleu profond
                            orange: '#f97316', // Orange dynamique
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Animations fluides */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Cacher la scrollbar pour un look plus propre */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col selection:bg-orange-200">

    <!-- En-tête -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl text-encp-blue cursor-pointer" onclick="resetQuiz()">
                <div class="w-8 h-8 bg-encp-orange rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                </div>
                Quizy
            </div>
            <button id="quit-btn" onclick="resetQuiz()" class="hidden text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">
                Quitter le quiz
            </button>
        </div>
    </header>

    <!-- Contenu Principal -->
    <main id="app" class="flex-grow max-w-5xl mx-auto px-4 py-8 md:py-12 w-full">
        <!-- Le contenu sera injecté ici par JavaScript -->
    </main>

    <!-- Logique de l'application (Vanilla JS) -->
    <script>
        // --- DONNÉES DE SECOURS (Intégrées directement pour que ça marche même sans fichier externe) ---
        const fallbackData = [
          {
            "categorie": "Anatomie",
            "sous_thematique": "Membres inférieurs, Analyse du mouvement",
            "question": "A quelle action le grand fessier ne participe pas :",
            "options": [
              "la rotation interne de la coxo-fémorale",
              "l’adduction de la coxo-fémorale",
              "l’abduction de la coxo-fémorale",
              "l’extension de la coxo-fémorale."
            ],
            "reponse": "la rotation interne de la coxo-fémorale",
            "feedback": "Le grand fessier est le principal extenseur de la hanche et un puissant rotateur externe. Les faisceaux supérieurs font de l'abduction et les inférieurs de l'adduction. La rotation interne est quant à elle assurée principalement par le petit et le moyen fessier."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Quel terme fait référence aux muscles abdominaux ?",
            "options": [
              "le couturier",
              "la ligne blanche",
              "le droit interne"
            ],
            "reponse": "la ligne blanche",
            "feedback": "Parmi les options, seule la ligne blanche (bande aponévrotique séparant les deux grands droits) se situe sur l'abdomen. Le couturier (sartorius) et le droit interne (gracile) sont des muscles de la cuisse."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis, Analyse du mouvement",
            "question": "Afin d’engager le muscle transverse, la consigne à donner est :",
            "options": [
              "De gonfler le ventre à l’expiration",
              "De gonfler le ventre à l’inspiration",
              "De rentrer le ventre à l’expiration"
            ],
            "reponse": "De rentrer le ventre à l’expiration",
            "feedback": "Le transverse est le muscle profond de l'abdomen. Son rôle est de retenir les viscères (effet 'gaine'). L'action de rentrer le ventre (réduction du diamètre ombilical) couplée à l'expiration forcée permet son recrutement optimal."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Comment se nomme la ligne qui sépare le droit de l’abdomen en deux ?",
            "options": [
              "La ligne âpre",
              "La symphyse pubienne",
              "La ligne blanche",
              "La ligne transversale"
            ],
            "reponse": "La ligne blanche",
            "feedback": "La ligne blanche (linea alba) est une intersection tendineuse verticale qui sépare les deux ventres musculaires du grand droit de l'abdomen, allant de l'appendice xiphoïde au pubis."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Le Grand droit s'étend de l'apophyse xiphoïde et de la face antérieure des côtes 5-6 -7 …",
            "options": [
              "Jusqu'au pubis",
              "Jusqu'à la crête iliaque"
            ],
            "reponse": "Jusqu'au pubis",
            "feedback": "Le grand droit s'insère en haut sur le sternum (apophyse xiphoïde) et les cartilages costaux, et descend verticalement pour se terminer en bas sur le bord supérieur du pubis."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis, Analyse du mouvement",
            "question": "Les muscles grands droits de l’abdomen sont :",
            "options": [
              "extenseurs du rachis dorso-lombaire",
              "fléchisseurs du rachis dorso-lombaire",
              "fléchisseurs de la coxo-fémorale"
            ],
            "reponse": "fléchisseurs du rachis dorso-lombaire",
            "feedback": "En rapprochant le sternum du pubis (contraction concentrique), le grand droit provoque la flexion de la colonne vertébrale (du tronc sur le bassin ou inversement)."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Quel muscle fait partie de la ceinture abdominale ?",
            "options": [
              "Oblique interne",
              "Rhomboïde",
              "Soléaire"
            ],
            "reponse": "Oblique interne",
            "feedback": "L'oblique interne (ou petit oblique) forme avec l'oblique externe, le transverse et le grand droit, la sangle abdominale. Le rhomboïde est dans le dos, le soléaire dans le mollet."
          }
        ];

        // --- ÉTAT DE L'APPLICATION ---
        let state = {
            view: 'home', // 'home', 'training', 'test', 'results'
            allQuestions: [],
            filteredQuestions: [],
            currentQuestionIndex: 0,
            userAnswers: {},
            showFeedback: false,
            selectedFile: 'anatomie.json',
            selectedSubTheme: 'Toutes',
            subThemes: ['Toutes']
        };

        // --- CHARGEMENT DES DONNÉES ---
        async function loadData() {
            try {
                // Tente de charger le fichier JSON depuis le dossier 'data'
                // Le chemin relatif 'data/...' fonctionne parfaitement sur Github Pages
                const res = await fetch('data/' + state.selectedFile);
                if (!res.ok) throw new Error('Fichier introuvable');
                state.allQuestions = await res.json();
            } catch (error) {
                console.warn('Utilisation des données intégrées de secours.', error);
                // Si le fetch échoue (ex: ouverture locale file:// ou fichier manquant), on utilise les données de secours
                state.allQuestions = fallbackData;
            }
            
            // Extraction des sous-thématiques uniques
            const themes = new Set();
            state.allQuestions.forEach(q => {
                if (q.sous_thematique) {
                    q.sous_thematique.split(',').forEach(t => themes.add(t.trim()));
                }
            });
            state.subThemes = ['Toutes', ...Array.from(themes).sort()];
            state.selectedSubTheme = 'Toutes';
            
            render();
        }

        async function handleFileChange(file) {
            state.selectedFile = file;
            await loadData();
        }

        // --- LOGIQUE DU QUIZ ---
        function startQuiz(mode) {
            let questions = [...state.allQuestions];
            
            // Filtrage par sous-thématique
            if (state.selectedSubTheme !== 'Toutes') {
                questions = questions.filter(q => q.sous_thematique.includes(state.selectedSubTheme));
            }
            
            // Mélange des questions (toujours aléatoire)
            questions.sort(() => Math.random() - 0.5);
            
            // Mélange des options pour chaque question
            questions = questions.map(q => {
                let opts = [...q.options];
                opts.sort(() => Math.random() - 0.5);
                return { ...q, options: opts };
            });

            // Mode Test : sélection de 20 max
            if (mode === 'test') {
                questions = questions.slice(0, 20);
            }

            if (questions.length === 0) {
                alert("Aucune question trouvée pour cette sélection.");
                return;
            }

            state.filteredQuestions = questions;
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            state.view = mode;
            render();
        }

        function handleAnswer(encodedAnswer) {
            if (state.userAnswers[state.currentQuestionIndex]) return; // Déjà répondu
            
            const answer = decodeURIComponent(encodedAnswer);
            state.userAnswers[state.currentQuestionIndex] = answer;
            
            if (state.view === 'training') {
                state.showFeedback = true;
                render();
            } else {
                render(); // Affiche la sélection en bleu
                // Passage automatique à la question suivante en mode test
                setTimeout(() => {
                    nextQuestion();
                }, 400);
            }
        }

        function nextQuestion() {
            if (state.view === 'training') {
                state.currentQuestionIndex++;
                if (state.currentQuestionIndex >= state.filteredQuestions.length) {
                    // Remélanger les questions quand on arrive à la fin
                    state.filteredQuestions.sort(() => Math.random() - 0.5);
                    state.currentQuestionIndex = 0;
                }
                // Nettoyer la réponse pour la nouvelle question
                delete state.userAnswers[state.currentQuestionIndex];
                state.showFeedback = false;
                render();
            } else {
                if (state.currentQuestionIndex < state.filteredQuestions.length - 1) {
                    state.currentQuestionIndex++;
                    state.showFeedback = false;
                    render();
                } else {
                    state.view = 'results';
                    render();
                }
            }
        }

        function resetQuiz() {
            state.view = 'home';
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            render();
        }

        // --- RENDU DE L'INTERFACE (VUES) ---
        function render() {
            const app = document.getElementById('app');
            const quitBtn = document.getElementById('quit-btn');
            
            if (state.view === 'home') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderHome();
            } else if (state.view === 'training' || state.view === 'test') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderQuiz();
            } else if (state.view === 'results') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderResults();
            }
            
            // Initialiser les icônes Lucide après chaque mise à jour du DOM
            lucide.createIcons();
        }

        function renderHome() {
            const optionsHtml = state.subThemes.map(t => 
                `<option value="${t}" ${state.selectedSubTheme === t ? 'selected' : ''}>${t}</option>`
            ).join('');
            
            return `
            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden fade-in">
                <div class="bg-encp-blue p-8 text-center">
                    <h1 class="text-3xl font-bold text-white mb-2">Quizy</h1>
                </div>
                <div class="p-8 space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Matière</label>
                        <select onchange="handleFileChange(this.value)" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-encp-orange outline-none transition-all">
                            <option value="anatomie.json" ${state.selectedFile === 'anatomie.json' ? 'selected' : ''}>Anatomie</option>
                            <option value="physiologie.json" ${state.selectedFile === 'physiologie.json' ? 'selected' : ''}>Physiologie</option>
                            <option value="nutrition.json" ${state.selectedFile === 'nutrition.json' ? 'selected' : ''}>Nutrition</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sous-thématique</label>
                        <select onchange="state.selectedSubTheme = this.value; render();" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-encp-orange outline-none transition-all">
                            ${optionsHtml}
                        </select>
                    </div>
                    <div class="pt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="startQuiz('training')" class="flex items-center justify-center gap-2 bg-blue-50 text-encp-blue p-4 rounded-xl font-semibold hover:bg-blue-100 transition-colors">
                            <i data-lucide="book-open" class="w-5 h-5"></i> Mode Entraînement
                        </button>
                        <button onclick="startQuiz('test')" class="flex items-center justify-center gap-2 bg-encp-orange text-white p-4 rounded-xl font-semibold hover:bg-orange-600 transition-colors shadow-md shadow-orange-500/20">
                            <i data-lucide="play" class="w-5 h-5"></i> Mode Test (20 Q)
                        </button>
                    </div>
                </div>
            </div>
            `;
        }

        function renderQuiz() {
            const q = state.filteredQuestions[state.currentQuestionIndex];
            if (!q) return '';
            
            const isTraining = state.view === 'training';
            const userAnswer = state.userAnswers[state.currentQuestionIndex];
            const isAnswered = !!userAnswer;
            
            let progressHtml = '';
            let questionCounterHtml = '';
            
            if (isTraining) {
                questionCounterHtml = `<span class="text-sm font-medium text-encp-blue">Question d'entraînement</span>`;
            } else {
                const progress = ((state.currentQuestionIndex + 1) / state.filteredQuestions.length) * 100;
                questionCounterHtml = `<span class="text-sm font-medium text-encp-blue">Question ${state.currentQuestionIndex + 1} / ${state.filteredQuestions.length}</span>`;
                progressHtml = `
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div class="bg-encp-orange h-2.5 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                </div>`;
            }
            
            let optionsHtml = q.options.map((opt) => {
                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between ";
                let iconHtml = '';
                
                if (isTraining && isAnswered) {
                    if (opt === q.reponse) {
                        btnClass += "border-green-500 bg-green-50 text-green-900";
                        iconHtml = `<i data-lucide="check-circle-2" class="text-green-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else if (opt === userAnswer) {
                        btnClass += "border-red-500 bg-red-50 text-red-900";
                        iconHtml = `<i data-lucide="x-circle" class="text-red-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-50";
                    }
                } else if (!isTraining && isAnswered && opt === userAnswer) {
                    btnClass += "border-encp-blue bg-blue-50 text-encp-blue";
                    iconHtml = `<i data-lucide="check-circle-2" class="text-encp-blue w-6 h-6 ml-4 shrink-0"></i>`;
                } else {
                    btnClass += "border-gray-200 hover:border-blue-300 hover:bg-blue-50 text-gray-700 cursor-pointer";
                }
                
                const safeOpt = encodeURIComponent(opt).replace(/'/g, "%27");
                
                return `
                <button onclick="handleAnswer('${safeOpt}')" ${isAnswered ? 'disabled' : ''} class="${btnClass}">
                    <span class="text-base md:text-lg">${opt}</span>
                    ${iconHtml}
                </button>`;
            }).join('');
            
            let feedbackHtml = '';
            if (isTraining && state.showFeedback) {
                feedbackHtml = `
                <div class="bg-gray-50 border-t border-gray-100 p-6 md:p-8 fade-in">
                    <h3 class="font-semibold text-gray-900 mb-2 flex items-center gap-2">
                        <i data-lucide="book-open" class="text-encp-blue w-5 h-5"></i> Explication
                    </h3>
                    <p class="text-gray-700 leading-relaxed">${q.feedback}</p>
                </div>`;
            }
            
            let nextBtnHtml = '';
            if (isAnswered && isTraining) {
                nextBtnHtml = `
                <div class="flex justify-end mt-6 fade-in">
                    <button onclick="nextQuestion()" class="flex items-center gap-2 bg-encp-blue text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-800 transition-colors shadow-md">
                        Question suivante <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>`;
            }

            return `
            <div class="max-w-3xl mx-auto fade-in">
                <div class="mb-8">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">
                            ${state.view === 'test' ? 'Test' : 'Entraînement'}
                        </span>
                        ${questionCounterHtml}
                    </div>
                    ${progressHtml}
                </div>
                
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 md:p-8">
                        <div class="inline-block px-3 py-1 bg-blue-50 text-blue-800 text-xs font-semibold rounded-full mb-4">
                            ${q.sous_thematique}
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-8 leading-relaxed">
                            ${q.question}
                        </h2>
                        <div class="space-y-3">
                            ${optionsHtml}
                        </div>
                    </div>
                    ${feedbackHtml}
                </div>
                ${nextBtnHtml}
            </div>
            `;
        }

        function renderResults() {
            let score = 0;
            state.filteredQuestions.forEach((q, idx) => {
                if (state.userAnswers[idx] === q.reponse) score++;
            });
            const percentage = Math.round((score / state.filteredQuestions.length) * 100);
            
            let correctionsHtml = state.filteredQuestions.map((q, idx) => {
                const isCorrect = state.userAnswers[idx] === q.reponse;
                const borderClass = isCorrect ? 'border-l-green-500' : 'border-l-red-500';
                const iconHtml = isCorrect 
                    ? `<i data-lucide="check-circle-2" class="text-green-500 w-6 h-6"></i>` 
                    : `<i data-lucide="x-circle" class="text-red-500 w-6 h-6"></i>`;
                
                let correctAnsHtml = !isCorrect ? `
                    <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                        <div class="text-xs font-semibold text-green-800 uppercase mb-1">Bonne réponse</div>
                        <div class="font-medium text-green-900">${q.reponse}</div>
                    </div>
                ` : '';

                return `
                <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border-l-4 ${borderClass} mb-6">
                    <div class="flex items-start gap-4 mb-4">
                        <div class="mt-1 shrink-0">${iconHtml}</div>
                        <div>
                            <div class="text-sm font-medium text-gray-500 mb-1">Question ${idx + 1}</div>
                            <h4 class="text-lg font-bold text-gray-900">${q.question}</h4>
                        </div>
                    </div>
                    <div class="ml-10 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <div class="text-xs font-semibold text-gray-500 uppercase mb-1">Votre réponse</div>
                                <div class="font-medium ${isCorrect ? 'text-green-700' : 'text-red-700'}">
                                    ${state.userAnswers[idx] || "Aucune réponse"}
                                </div>
                            </div>
                            ${correctAnsHtml}
                        </div>
                        <div class="bg-blue-50 p-5 rounded-xl text-encp-blue mt-4">
                            <div class="font-semibold mb-1 flex items-center gap-2">
                                <i data-lucide="book-open" class="w-4 h-4"></i> Explication
                            </div>
                            <p class="text-sm leading-relaxed opacity-90">${q.feedback}</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            return `
            <div class="max-w-4xl mx-auto fade-in">
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-8 text-center p-10 border border-gray-100">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-100 text-encp-orange rounded-full mb-6">
                        <i data-lucide="award" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Résultats du Test</h2>
                    <p class="text-gray-500 mb-8">Voici votre score et la correction détaillée.</p>
                    
                    <div class="flex justify-center items-center gap-8 mb-10">
                        <div class="text-center">
                            <div class="text-5xl font-black text-encp-blue mb-1">${score}<span class="text-2xl text-gray-400">/${state.filteredQuestions.length}</span></div>
                            <div class="text-sm font-medium text-gray-500 uppercase tracking-wider">Score</div>
                        </div>
                        <div class="w-px h-16 bg-gray-200"></div>
                        <div class="text-center">
                            <div class="text-5xl font-black text-encp-orange mb-1">${percentage}%</div>
                            <div class="text-sm font-medium text-gray-500 uppercase tracking-wider">Réussite</div>
                        </div>
                    </div>
                    <button onclick="resetQuiz()" class="inline-flex items-center gap-2 bg-encp-blue text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-800 transition-colors shadow-lg">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Nouveau Quiz
                    </button>
                </div>
                <div class="space-y-6">
                    <h3 class="text-2xl font-bold text-gray-900 px-2">Correction détaillée</h3>
                    ${correctionsHtml}
                </div>
            </div>
            `;
        }

        // --- DÉMARRAGE ---
        window.onload = () => {
            loadData();
        };
    </script>
</body>
</html>
