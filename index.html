<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy</title>
    
    <!-- Favicons -->
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="logo.svg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configuration Tailwind pour les couleurs de l'ENCP -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        encp: {
                            dark: '#310A27',
                            orange: '#E05A00',
                            lightpink: '#FAD4D8',
                            darkpink: '#C94A65',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Animations fluides */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Cacher la scrollbar pour un look plus propre */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Scrollbar personnalisée pour les menus déroulants */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-[#F9FAFB] text-gray-900 font-sans min-h-screen flex flex-col selection:bg-encp-lightpink selection:text-encp-dark">

    <!-- En-tête -->
    <header class="bg-encp-dark border-b border-encp-dark/80 sticky top-0 z-20 shadow-md overflow-hidden relative">
        <!-- Decorative circles -->
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full border-4 border-white/5 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full border-4 border-white/5 pointer-events-none"></div>
        
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between relative z-10">
            <div class="flex items-center gap-3 font-extrabold text-2xl text-white cursor-pointer tracking-tight hover:opacity-90 transition-opacity" onclick="resetQuiz()">
                <div class="bg-white p-1.5 rounded-xl shadow-sm transform -rotate-3">
                    <img src="logo.svg" alt="Quizy Logo" class="w-6 h-6" />
                </div>
                Quizy
            </div>
            <button id="quit-btn" onclick="resetQuiz()" class="hidden text-sm font-semibold text-encp-lightpink hover:text-white transition-colors bg-white/10 px-4 py-2 rounded-lg">
                Quitter le quiz
            </button>
        </div>
    </header>

    <!-- Contenu Principal -->
    <main id="app" class="flex-grow max-w-5xl mx-auto px-4 py-8 md:py-12 w-full">
        <!-- Le contenu sera injecté ici par JavaScript -->
    </main>

    <!-- Logique de l'application (Vanilla JS) -->
    <script>
        // --- DONNÉES DE SECOURS (Intégrées directement pour que ça marche même sans fichier externe) ---
        const fallbackData = [
          {
            "categorie": "Anatomie",
            "sous_thematique": "Membres inférieurs, Analyse du mouvement",
            "question": "A quelle action le grand fessier ne participe pas :",
            "options": [
              "la rotation interne de la coxo-fémorale",
              "l’adduction de la coxo-fémorale",
              "l’abduction de la coxo-fémorale",
              "l’extension de la coxo-fémorale."
            ],
            "reponse": "la rotation interne de la coxo-fémorale",
            "feedback": "Le grand fessier est le principal extenseur de la hanche et un puissant rotateur externe. Les faisceaux supérieurs font de l'abduction et les inférieurs de l'adduction. La rotation interne est quant à elle assurée principalement par le petit et le moyen fessier."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Quel terme fait référence aux muscles abdominaux ?",
            "options": [
              "le couturier",
              "la ligne blanche",
              "le droit interne"
            ],
            "reponse": "la ligne blanche",
            "feedback": "Parmi les options, seule la ligne blanche (bande aponévrotique séparant les deux grands droits) se situe sur l'abdomen. Le couturier (sartorius) et le droit interne (gracile) sont des muscles de la cuisse."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis, Analyse du mouvement",
            "question": "Afin d’engager le muscle transverse, la consigne à donner est :",
            "options": [
              "De gonfler le ventre à l’expiration",
              "De gonfler le ventre à l’inspiration",
              "De rentrer le ventre à l’expiration"
            ],
            "reponse": "De rentrer le ventre à l’expiration",
            "feedback": "Le transverse est le muscle profond de l'abdomen. Son rôle est de retenir les viscères (effet 'gaine'). L'action de rentrer le ventre (réduction du diamètre ombilical) couplée à l'expiration forcée permet son recrutement optimal."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Comment se nomme la ligne qui sépare le droit de l’abdomen en deux ?",
            "options": [
              "La ligne âpre",
              "La symphyse pubienne",
              "La ligne blanche",
              "La ligne transversale"
            ],
            "reponse": "La ligne blanche",
            "feedback": "La ligne blanche (linea alba) est une intersection tendineuse verticale qui sépare les deux ventres musculaires du grand droit de l'abdomen, allant de l'appendice xiphoïde au pubis."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Le Grand droit s'étend de l'apophyse xiphoïde et de la face antérieure des côtes 5-6 -7 …",
            "options": [
              "Jusqu'au pubis",
              "Jusqu'à la crête iliaque"
            ],
            "reponse": "Jusqu'au pubis",
            "feedback": "Le grand droit s'insère en haut sur le sternum (apophyse xiphoïde) et les cartilages costaux, et descend verticalement pour se terminer en bas sur le bord supérieur du pubis."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis, Analyse du mouvement",
            "question": "Les muscles grands droits de l’abdomen sont :",
            "options": [
              "extenseurs du rachis dorso-lombaire",
              "fléchisseurs du rachis dorso-lombaire",
              "fléchisseurs de la coxo-fémorale"
            ],
            "reponse": "fléchisseurs du rachis dorso-lombaire",
            "feedback": "En rapprochant le sternum du pubis (contraction concentrique), le grand droit provoque la flexion de la colonne vertébrale (du tronc sur le bassin ou inversement)."
          },
          {
            "categorie": "Anatomie",
            "sous_thematique": "Tronc et Rachis",
            "question": "Quel muscle fait partie de la ceinture abdominale ?",
            "options": [
              "Oblique interne",
              "Rhomboïde",
              "Soléaire"
            ],
            "reponse": "Oblique interne",
            "feedback": "L'oblique interne (ou petit oblique) forme avec l'oblique externe, le transverse et le grand droit, la sangle abdominale. Le rhomboïde est dans le dos, le soléaire dans le mollet."
          }
        ];

        // --- GESTION DES MENUS DÉROULANTS ---
        function toggleDropdown(id) {
            ['file', 'theme'].forEach(otherId => {
                if (otherId !== id) {
                    const otherOptions = document.getElementById(`options-${otherId}`);
                    const otherChevron = document.getElementById(`chevron-${otherId}`);
                    if (otherOptions && !otherOptions.classList.contains('invisible')) {
                        otherOptions.classList.add('invisible', 'opacity-0', '-translate-y-2');
                        if (otherChevron) otherChevron.classList.remove('rotate-180');
                    }
                }
            });

            const options = document.getElementById(`options-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (options) {
                if (options.classList.contains('invisible')) {
                    options.classList.remove('invisible', 'opacity-0', '-translate-y-2');
                    if (chevron) chevron.classList.add('rotate-180');
                } else {
                    options.classList.add('invisible', 'opacity-0', '-translate-y-2');
                    if (chevron) chevron.classList.remove('rotate-180');
                }
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                ['file', 'theme'].forEach(id => {
                    const options = document.getElementById(`options-${id}`);
                    const chevron = document.getElementById(`chevron-${id}`);
                    if (options && !options.classList.contains('invisible')) {
                        options.classList.add('invisible', 'opacity-0', '-translate-y-2');
                        if (chevron) chevron.classList.remove('rotate-180');
                    }
                });
            }
        });

        // --- ÉTAT DE L'APPLICATION ---
        let state = {
            view: 'home', // 'home', 'training', 'test', 'results'
            allQuestions: [],
            filteredQuestions: [],
            currentQuestionIndex: 0,
            userAnswers: {},
            showFeedback: false,
            selectedFile: 'anatomie.json',
            selectedSubTheme: 'Toutes',
            subThemes: ['Toutes']
        };

        // --- ANIMATION ---
        function triggerAnimation() {
            const app = document.getElementById('app');
            app.classList.remove('fade-in');
            void app.offsetWidth; // trigger reflow
            app.classList.add('fade-in');
        }

        // --- CHARGEMENT DES DONNÉES ---
        async function loadData() {
            try {
                // Tente de charger le fichier JSON depuis le dossier 'data'
                // Le chemin relatif 'data/...' fonctionne parfaitement sur Github Pages
                const res = await fetch('data/' + state.selectedFile);
                if (!res.ok) throw new Error('Fichier introuvable');
                state.allQuestions = await res.json();
            } catch (error) {
                console.warn('Utilisation des données intégrées de secours.', error);
                // Si le fetch échoue (ex: ouverture locale file:// ou fichier manquant), on utilise les données de secours
                state.allQuestions = fallbackData;
            }
            
            // Extraction des sous-thématiques uniques
            const themes = new Set();
            state.allQuestions.forEach(q => {
                if (q.sous_thematique) {
                    q.sous_thematique.split(',').forEach(t => themes.add(t.trim()));
                }
            });
            state.subThemes = ['Toutes', ...Array.from(themes).sort()];
            state.selectedSubTheme = 'Toutes';
            
            render();
        }

        async function handleFileChange(file) {
            state.selectedFile = file;
            await loadData();
        }

        // --- LOGIQUE DU QUIZ ---
        function startQuiz(mode) {
            let questions = [...state.allQuestions];
            
            // Filtrage par sous-thématique
            if (state.selectedSubTheme !== 'Toutes') {
                questions = questions.filter(q => q.sous_thematique.includes(state.selectedSubTheme));
            }
            
            // Mélange des questions (toujours aléatoire)
            questions.sort(() => Math.random() - 0.5);
            
            // Mélange des options pour chaque question
            questions = questions.map(q => {
                let opts = [...q.options];
                opts.sort(() => Math.random() - 0.5);
                return { ...q, options: opts };
            });

            // Mode Test : sélection de 20 max
            if (mode === 'test') {
                questions = questions.slice(0, 20);
            }

            if (questions.length === 0) {
                alert("Aucune question trouvée pour cette sélection.");
                return;
            }

            state.filteredQuestions = questions;
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            state.view = mode;
            render();
            triggerAnimation();
        }

        function handleAnswer(encodedAnswer) {
            if (state.userAnswers[state.currentQuestionIndex]) return; // Déjà répondu
            
            const answer = decodeURIComponent(encodedAnswer);
            state.userAnswers[state.currentQuestionIndex] = answer;
            
            if (state.view === 'training') {
                state.showFeedback = true;
                render();
            } else {
                render(); // Affiche la sélection en bleu
                // Passage automatique à la question suivante en mode test
                setTimeout(() => {
                    nextQuestion();
                }, 400);
            }
        }

        function nextQuestion() {
            if (state.view === 'training') {
                state.currentQuestionIndex++;
                if (state.currentQuestionIndex >= state.filteredQuestions.length) {
                    // Remélanger les questions quand on arrive à la fin
                    state.filteredQuestions.sort(() => Math.random() - 0.5);
                    state.currentQuestionIndex = 0;
                }
                // Nettoyer la réponse pour la nouvelle question
                delete state.userAnswers[state.currentQuestionIndex];
                state.showFeedback = false;
                render();
                triggerAnimation();
            } else {
                if (state.currentQuestionIndex < state.filteredQuestions.length - 1) {
                    state.currentQuestionIndex++;
                    state.showFeedback = false;
                    render();
                    triggerAnimation();
                } else {
                    state.view = 'results';
                    render();
                    triggerAnimation();
                }
            }
        }

        function resetQuiz() {
            state.view = 'home';
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            render();
            triggerAnimation();
        }

        // --- RENDU DE L'INTERFACE (VUES) ---
        function render() {
            const app = document.getElementById('app');
            const quitBtn = document.getElementById('quit-btn');
            
            if (state.view === 'home') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderHome();
            } else if (state.view === 'training' || state.view === 'test') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderQuiz();
            } else if (state.view === 'results') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderResults();
            }
            
            // Initialiser les icônes Lucide après chaque mise à jour du DOM
            lucide.createIcons();
        }

        function renderHome() {
            const files = [
                { value: 'anatomie.json', label: 'Anatomie' },
                { value: 'physiologie.json', label: 'Physiologie' },
                { value: 'nutrition.json', label: 'Nutrition' }
            ];
            const selectedFileLabel = files.find(f => f.value === state.selectedFile)?.label || 'Anatomie';
            
            const fileOptionsHtml = files.map(f => `
                <button onclick="handleFileChange('${f.value}')" class="w-full text-left px-4 py-3 rounded-xl transition-colors font-medium ${state.selectedFile === f.value ? 'bg-encp-lightpink/50 text-encp-darkpink' : 'hover:bg-gray-50 text-gray-700'}">
                    ${f.label}
                </button>
            `).join('');

            const themeOptionsHtml = state.subThemes.map(t => `
                <button onclick="state.selectedSubTheme = '${t.replace(/'/g, "\\'")}'; render();" class="w-full text-left px-4 py-3 rounded-xl transition-colors font-medium ${state.selectedSubTheme === t ? 'bg-encp-lightpink/50 text-encp-darkpink' : 'hover:bg-gray-50 text-gray-700'}">
                    ${t}
                </button>
            `).join('');
            
            return `
            <div class="max-w-3xl mx-auto">
                <div class="bg-encp-dark rounded-3xl shadow-2xl overflow-hidden mb-8 relative">
                    <!-- Decorative circles -->
                    <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full border-4 border-white/5"></div>
                    <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full border-4 border-white/5"></div>
                    
                    <div class="p-10 md:p-14 text-center relative z-10 flex flex-col items-center justify-center">
                        <div class="bg-white p-4 rounded-3xl shadow-xl mb-6 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                            <img src="logo.svg" alt="Quizy Logo" class="w-16 h-16" />
                        </div>
                        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">Prêt à tester vos connaissances ?</h1>
                        <p class="text-encp-lightpink text-lg max-w-lg mx-auto">Sélectionnez une matière et une thématique pour commencer votre entraînement.</p>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10 space-y-8 border border-gray-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2 custom-dropdown">
                            <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Matière</label>
                            <div class="relative">
                                <button onclick="toggleDropdown('file')" class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-2xl flex justify-between items-center focus:border-encp-orange outline-none transition-all font-medium text-gray-800 hover:border-gray-300">
                                    <span>${selectedFileLabel}</span>
                                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500 transition-transform duration-200" id="chevron-file"></i>
                                </button>
                                <div id="options-file" class="absolute z-30 w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl opacity-0 invisible transform -translate-y-2 transition-all duration-200 overflow-hidden">
                                    <div class="p-2 space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                                        ${fileOptionsHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2 custom-dropdown">
                            <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Sous-thématique</label>
                            <div class="relative">
                                <button onclick="toggleDropdown('theme')" class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-2xl flex justify-between items-center focus:border-encp-orange outline-none transition-all font-medium text-gray-800 hover:border-gray-300">
                                    <span class="truncate pr-4">${state.selectedSubTheme}</span>
                                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500 transition-transform duration-200 shrink-0" id="chevron-theme"></i>
                                </button>
                                <div id="options-theme" class="absolute z-30 w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl opacity-0 invisible transform -translate-y-2 transition-all duration-200 overflow-hidden">
                                    <div class="p-2 space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                                        ${themeOptionsHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <button onclick="startQuiz('training')" class="group relative flex flex-col items-center justify-center gap-3 bg-white border-2 border-encp-darkpink/20 hover:border-encp-darkpink text-encp-dark p-8 rounded-3xl font-bold transition-all hover:shadow-lg hover:-translate-y-1">
                            <div class="w-16 h-16 bg-encp-lightpink rounded-2xl flex items-center justify-center text-encp-darkpink group-hover:scale-110 transition-transform">
                                <i data-lucide="book-open" class="w-8 h-8"></i>
                            </div>
                            <span class="text-lg">Mode Entraînement</span>
                            <span class="text-sm text-gray-500 font-normal text-center">Apprenez avec les corrections détaillées</span>
                        </button>
                        <button onclick="startQuiz('test')" class="group relative flex flex-col items-center justify-center gap-3 bg-encp-orange text-white p-8 rounded-3xl font-bold transition-all hover:bg-[#c95000] hover:shadow-xl hover:shadow-encp-orange/30 hover:-translate-y-1">
                            <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white group-hover:scale-110 transition-transform">
                                <i data-lucide="play" class="w-8 h-8 fill-current"></i>
                            </div>
                            <span class="text-lg">Mode Test (20 Q)</span>
                            <span class="text-sm text-white/80 font-normal text-center">Évaluez-vous en conditions réelles</span>
                        </button>
                    </div>
                </div>
            </div>
            `;
        }

        function renderQuiz() {
            const q = state.filteredQuestions[state.currentQuestionIndex];
            if (!q) return '';
            
            const isTraining = state.view === 'training';
            const userAnswer = state.userAnswers[state.currentQuestionIndex];
            const isAnswered = !!userAnswer;
            
            let progressHtml = '';
            let questionCounterHtml = '';
            
            if (isTraining) {
                questionCounterHtml = `<span class="text-sm font-bold text-encp-darkpink bg-encp-lightpink px-3 py-1 rounded-full">Mode Entraînement</span>`;
            } else {
                const progress = ((state.currentQuestionIndex + 1) / state.filteredQuestions.length) * 100;
                questionCounterHtml = `<span class="text-sm font-bold text-encp-dark bg-gray-100 px-3 py-1 rounded-full">Question ${state.currentQuestionIndex + 1} / ${state.filteredQuestions.length}</span>`;
                progressHtml = `
                <div class="w-full bg-gray-200 rounded-full h-3 mb-6 overflow-hidden">
                    <div class="bg-encp-orange h-full rounded-full transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                </div>`;
            }
            
            let optionsHtml = q.options.map((opt) => {
                let btnClass = "w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 flex items-center justify-between font-medium ";
                let iconHtml = '';
                
                if (isTraining && isAnswered) {
                    if (opt === q.reponse) {
                        btnClass += "border-green-500 bg-green-50 text-green-900 shadow-sm";
                        iconHtml = `<i data-lucide="check-circle-2" class="text-green-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else if (opt === userAnswer) {
                        btnClass += "border-red-500 bg-red-50 text-red-900 shadow-sm";
                        iconHtml = `<i data-lucide="x-circle" class="text-red-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-60";
                    }
                } else if (!isTraining && isAnswered && opt === userAnswer) {
                    btnClass += "border-encp-orange bg-orange-50 text-encp-orange shadow-sm";
                    iconHtml = `<i data-lucide="check-circle-2" class="text-encp-orange w-6 h-6 ml-4 shrink-0"></i>`;
                } else {
                    btnClass += "border-gray-200 hover:border-encp-orange hover:bg-orange-50 text-gray-700 cursor-pointer hover:shadow-md";
                }
                
                const safeOpt = encodeURIComponent(opt).replace(/'/g, "%27");
                
                return `
                <button onclick="handleAnswer('${safeOpt}')" ${isAnswered ? 'disabled' : ''} class="${btnClass}">
                    <span class="text-base md:text-lg">${opt}</span>
                    ${iconHtml}
                </button>`;
            }).join('');
            
            let feedbackHtml = '';
            if (isTraining && state.showFeedback) {
                feedbackHtml = `
                <div class="bg-encp-lightpink/30 border-t-2 border-encp-lightpink p-6 md:p-8 fade-in">
                    <h3 class="font-bold text-encp-dark mb-3 flex items-center gap-2 text-lg">
                        <i data-lucide="lightbulb" class="text-encp-orange w-6 h-6"></i> Explication
                    </h3>
                    <p class="text-gray-800 leading-relaxed text-lg">${q.feedback}</p>
                </div>`;
            }
            
            let nextBtnHtml = '';
            if (isAnswered && isTraining) {
                nextBtnHtml = `
                <div class="flex justify-end mt-8 fade-in">
                    <button onclick="nextQuestion()" class="flex items-center gap-2 bg-encp-dark text-white px-8 py-4 rounded-2xl font-bold hover:bg-[#4a103c] transition-colors shadow-lg hover:-translate-y-1">
                        Question suivante <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>`;
            }

            return `
            <div class="max-w-3xl mx-auto">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-black text-gray-400 uppercase tracking-widest">
                            ${state.view === 'test' ? 'Évaluation' : 'Pratique'}
                        </span>
                        ${questionCounterHtml}
                    </div>
                    ${progressHtml}
                </div>
                
                <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                    <div class="p-8 md:p-10">
                        <div class="inline-block px-4 py-1.5 bg-encp-lightpink text-encp-darkpink text-xs font-bold uppercase tracking-wider rounded-full mb-6">
                            ${q.sous_thematique}
                        </div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-encp-dark mb-10 leading-tight">
                            ${q.question}
                        </h2>
                        <div class="space-y-4">
                            ${optionsHtml}
                        </div>
                    </div>
                    ${feedbackHtml}
                </div>
                ${nextBtnHtml}
            </div>
            `;
        }

        function renderResults() {
            let score = 0;
            state.filteredQuestions.forEach((q, idx) => {
                if (state.userAnswers[idx] === q.reponse) score++;
            });
            const percentage = Math.round((score / state.filteredQuestions.length) * 100);
            
            let correctionsHtml = state.filteredQuestions.map((q, idx) => {
                const isCorrect = state.userAnswers[idx] === q.reponse;
                const borderClass = isCorrect ? 'border-l-green-500' : 'border-l-red-500';
                const iconHtml = isCorrect 
                    ? `<div class="bg-green-100 p-2 rounded-full"><i data-lucide="check" class="text-green-600 w-6 h-6"></i></div>` 
                    : `<div class="bg-red-100 p-2 rounded-full"><i data-lucide="x" class="text-red-600 w-6 h-6"></i></div>`;
                
                let correctAnsHtml = !isCorrect ? `
                    <div class="bg-green-50 p-5 rounded-2xl border border-green-100">
                        <div class="text-xs font-bold text-green-800 uppercase tracking-wider mb-2">Bonne réponse</div>
                        <div class="font-semibold text-green-900 text-lg">${q.reponse}</div>
                    </div>
                ` : '';

                return `
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-md border border-gray-100 border-l-8 ${borderClass} mb-6">
                    <div class="flex items-start gap-5 mb-6">
                        <div class="shrink-0 mt-1">${iconHtml}</div>
                        <div>
                            <div class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-1">Question ${idx + 1}</div>
                            <h4 class="text-xl font-bold text-encp-dark leading-snug">${q.question}</h4>
                        </div>
                    </div>
                    <div class="ml-14 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                                <div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Votre réponse</div>
                                <div class="font-semibold text-lg ${isCorrect ? 'text-green-700' : 'text-red-700'}">
                                    ${state.userAnswers[idx] || "Aucune réponse"}
                                </div>
                            </div>
                            ${correctAnsHtml}
                        </div>
                        <div class="bg-encp-lightpink/30 p-6 rounded-2xl text-encp-dark mt-4 border border-encp-lightpink/50">
                            <div class="font-bold mb-2 flex items-center gap-2 text-encp-darkpink">
                                <i data-lucide="info" class="w-5 h-5"></i> Explication
                            </div>
                            <p class="text-base leading-relaxed text-gray-800">${q.feedback}</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            return `
            <div class="max-w-4xl mx-auto">
                <div class="bg-encp-dark rounded-3xl shadow-2xl overflow-hidden mb-10 text-center p-12 relative">
                    <!-- Decorative circles -->
                    <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full border-4 border-white/5"></div>
                    <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full border-4 border-white/5"></div>
                    
                    <div class="relative z-10">
                        <div class="inline-flex items-center justify-center w-24 h-24 bg-encp-orange text-white rounded-full mb-6 shadow-lg shadow-encp-orange/40">
                            <i data-lucide="award" class="w-12 h-12"></i>
                        </div>
                        <h2 class="text-4xl font-extrabold text-white mb-3 tracking-tight">Résultats du Test</h2>
                        <p class="text-encp-lightpink text-lg mb-10">Voici votre score et la correction détaillée.</p>
                        
                        <div class="flex justify-center items-center gap-12 mb-12 bg-white/10 p-8 rounded-3xl backdrop-blur-sm max-w-lg mx-auto">
                            <div class="text-center">
                                <div class="text-6xl font-black text-white mb-2">${score}<span class="text-3xl text-white/50">/${state.filteredQuestions.length}</span></div>
                                <div class="text-sm font-bold text-encp-lightpink uppercase tracking-widest">Score</div>
                            </div>
                            <div class="w-px h-20 bg-white/20"></div>
                            <div class="text-center">
                                <div class="text-6xl font-black text-encp-orange mb-2">${percentage}%</div>
                                <div class="text-sm font-bold text-encp-lightpink uppercase tracking-widest">Réussite</div>
                            </div>
                        </div>
                        <button onclick="resetQuiz()" class="inline-flex items-center gap-3 bg-white text-encp-dark px-10 py-5 rounded-2xl font-extrabold hover:bg-gray-100 transition-all shadow-xl hover:-translate-y-1 text-lg">
                            <i data-lucide="rotate-ccw" class="w-6 h-6"></i> Nouveau Quiz
                        </button>
                    </div>
                </div>
                <div class="space-y-8">
                    <h3 class="text-3xl font-extrabold text-encp-dark px-2 tracking-tight">Correction détaillée</h3>
                    ${correctionsHtml}
                </div>
            </div>
            `;
        }

        // --- DÉMARRAGE ---
        window.onload = async () => {
            await loadData();
            triggerAnimation();
        };
    </script>
</body>
</html>
